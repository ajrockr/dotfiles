; Neon Dark palette — maps catppuccin variable names used in config.ini
; to a black/grey/red/blue neon scheme

[colors]
; Core backgrounds
base       = #0f0f0f
mantle     = #080808
crust      = #060606

; Surfaces / overlays
surface0   = #1a1a1a
surface1   = #222222
surface2   = #2e2e2e
overlay0   = #3d3d3d
overlay1   = #555555
overlay2   = #6a6a6a

; Text
text       = #c0c0c0
subtext1   = #a0a0a0
subtext0   = #888888

; Accents
red        = #ff2244
maroon     = #cc1133
peach      = #ff2244
rosewater  = #00aaff
lavender   = #00aaff
blue       = #00aaff
sapphire   = #0088ff
sky        = #00ccff
teal       = #0077cc
green      = #33cc66
yellow     = #ffcc00
flamingo   = #ff4488
pink       = #ff44aa
mauve      = #8855ff

; Misc
transparent = #00000000
disabled    = #3d3d3d
